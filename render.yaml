services:
  - type: web
    name: enterprise-ai-diagnosis
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run render-start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WECHAT_WORK_WEBHOOK_URL
        sync: false
